  <path d="M364 274V316C364 346 394 399 396 399" stroke="#64748B" stroke-width="3" stroke-linecap="round"/>
  <path d="M386 389L398 399L386 409" stroke="#64748B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
