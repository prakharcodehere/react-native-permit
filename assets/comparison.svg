<svg width="1120" height="640" viewBox="0 0 1120 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">react-native-permit comparison</title>
  <desc id="desc">Comparison of react-native-permissions, manual app code, and react-native-permit across native access, hooks, retries, UI, analytics, and testing.</desc>
  <rect width="1120" height="640" rx="28" fill="#F8FAFC"/>

  <text x="56" y="66" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="34" font-weight="800">Comparison</text>
  <text x="56" y="100" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="18">Native access stays in react-native-permissions. Product flow lives in react-native-permit.</text>

  <g font-family="Inter, ui-sans-serif, system-ui">
    <rect x="56" y="150" width="296" height="354" rx="22" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
    <rect x="84" y="178" width="72" height="72" rx="20" fill="#2563EB"/>
    <path d="M104 215L116 227L138 201" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="84" y="286" fill="#1E3A8A" font-size="23" font-weight="800">react-native-permissions</text>
    <text x="84" y="318" fill="#1D4ED8" font-size="15" font-weight="700">Native permission access</text>
    <text x="84" y="358" fill="#334155" font-size="15">check/request/settings</text>
    <text x="84" y="386" fill="#334155" font-size="15">platform permission constants</text>
    <text x="84" y="414" fill="#334155" font-size="15">notification permission APIs</text>
    <rect x="84" y="446" width="162" height="34" rx="17" fill="#DBEAFE"/>
    <text x="165" y="468" text-anchor="middle" fill="#1D4ED8" font-size="14" font-weight="800">required peer</text>

    <rect x="412" y="150" width="296" height="354" rx="22" fill="#FFF7ED" stroke="#FED7AA" stroke-width="2"/>
    <rect x="440" y="178" width="72" height="72" rx="20" fill="#EA580C"/>
    <path d="M462 203H492" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
    <path d="M462 226H492" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
    <text x="440" y="286" fill="#7C2D12" font-size="23" font-weight="800">Manual app code</text>
    <text x="440" y="318" fill="#C2410C" font-size="15" font-weight="700">Everything around the prompt</text>
    <text x="440" y="358" fill="#334155" font-size="15">retry state</text>
    <text x="440" y="386" fill="#334155" font-size="15">blocked Settings fallback</text>
    <text x="440" y="414" fill="#334155" font-size="15">onboarding and UI surfaces</text>
    <rect x="440" y="446" width="166" height="34" rx="17" fill="#FFEDD5"/>
    <text x="523" y="468" text-anchor="middle" fill="#C2410C" font-size="14" font-weight="800">you write it</text>

    <rect x="768" y="150" width="296" height="354" rx="22" fill="#ECFDF5" stroke="#BBF7D0" stroke-width="2"/>
    <rect x="796" y="178" width="72" height="72" rx="20" fill="#059669"/>
    <path d="M816 217L828 229L852 199" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="796" y="286" fill="#064E3B" font-size="23" font-weight="800">react-native-permit</text>
    <text x="796" y="318" fill="#047857" font-size="15" font-weight="700">Small product-flow layer</text>
    <text x="796" y="358" fill="#334155" font-size="15">hooks and sequence state</text>
    <text x="796" y="386" fill="#334155" font-size="15">retry and persisted exhaustion</text>
    <text x="796" y="414" fill="#334155" font-size="15">modal, sheet, screen, inline UI</text>
    <rect x="796" y="446" width="158" height="34" rx="17" fill="#D1FAE5"/>
    <text x="875" y="468" text-anchor="middle" fill="#047857" font-size="14" font-weight="800">provided here</text>
  </g>

  <path d="M352 327H406" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  <path d="M396 317L408 327L396 337" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M708 327H762" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  <path d="M752 317L764 327L752 337" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g font-family="Inter, ui-sans-serif, system-ui">
    <rect x="92" y="548" width="936" height="54" rx="27" fill="#0F172A"/>
    <text x="560" y="582" text-anchor="middle" fill="#E2E8F0" font-size="16" font-weight="700">Use react-native-permit when the app needs a permission flow, not only a native prompt.</text>
  </g>
</svg>
