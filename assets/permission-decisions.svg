<svg width="1120" height="620" viewBox="0 0 1120 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Permission decisions</title>
  <desc id="desc">Decision diagram for permission results, blocked versus denied, and what UI a React Native app should show.</desc>
  <rect width="1120" height="620" rx="28" fill="#F8FAFC"/>
  <text x="56" y="66" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="34" font-weight="800">Permission decisions</text>
  <text x="56" y="100" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="18">Map each result to the UI your app should render.</text>

  <g font-family="Inter, ui-sans-serif, system-ui">
    <rect x="56" y="146" width="210" height="78" rx="18" fill="#E0F2FE" stroke="#0284C7"/>
    <text x="161" y="178" text-anchor="middle" fill="#075985" font-size="18" font-weight="800">unknown</text>
    <text x="161" y="202" text-anchor="middle" fill="#0369A1" font-size="13">show loading</text>

    <rect x="56" y="270" width="210" height="78" rx="18" fill="#DCFCE7" stroke="#22C55E"/>
    <text x="161" y="302" text-anchor="middle" fill="#166534" font-size="18" font-weight="800">granted</text>
    <text x="161" y="326" text-anchor="middle" fill="#15803D" font-size="13">render feature</text>

    <rect x="56" y="394" width="210" height="78" rx="18" fill="#FEF3C7" stroke="#F59E0B"/>
    <text x="161" y="426" text-anchor="middle" fill="#92400E" font-size="18" font-weight="800">limited / provisional</text>
    <text x="161" y="450" text-anchor="middle" fill="#B45309" font-size="13">continue with context</text>

    <rect x="454" y="146" width="210" height="78" rx="18" fill="#FFE4E6" stroke="#FB7185"/>
    <text x="559" y="178" text-anchor="middle" fill="#9F1239" font-size="18" font-weight="800">denied</text>
    <text x="559" y="202" text-anchor="middle" fill="#BE123C" font-size="13">retry or degrade</text>

    <rect x="454" y="270" width="210" height="78" rx="18" fill="#FEE2E2" stroke="#EF4444"/>
    <text x="559" y="302" text-anchor="middle" fill="#991B1B" font-size="18" font-weight="800">blocked</text>
    <text x="559" y="326" text-anchor="middle" fill="#B91C1C" font-size="13">open Settings</text>

    <rect x="454" y="394" width="210" height="78" rx="18" fill="#F3E8FF" stroke="#A855F7"/>
    <text x="559" y="426" text-anchor="middle" fill="#6B21A8" font-size="18" font-weight="800">exhausted</text>
    <text x="559" y="450" text-anchor="middle" fill="#7E22CE" font-size="13">stop asking</text>

    <rect x="852" y="146" width="210" height="78" rx="18" fill="#E5E7EB" stroke="#6B7280"/>
    <text x="957" y="178" text-anchor="middle" fill="#374151" font-size="18" font-weight="800">unavailable</text>
    <text x="957" y="202" text-anchor="middle" fill="#4B5563" font-size="13">hide or disable</text>

    <rect x="852" y="270" width="210" height="78" rx="18" fill="#DBEAFE" stroke="#3B82F6"/>
    <text x="957" y="302" text-anchor="middle" fill="#1E40AF" font-size="18" font-weight="800">skipped</text>
    <text x="957" y="326" text-anchor="middle" fill="#1D4ED8" font-size="13">continue optional flow</text>

    <rect x="852" y="394" width="210" height="78" rx="18" fill="#F1F5F9" stroke="#94A3B8"/>
    <text x="957" y="426" text-anchor="middle" fill="#334155" font-size="18" font-weight="800">cancelled</text>
    <text x="957" y="450" text-anchor="middle" fill="#475569" font-size="13">ignore abandoned flow</text>
  </g>

  <path d="M266 185H448" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  <path d="M438 175L450 185L438 195" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M664 309H846" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  <path d="M836 299L848 309L836 319" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="138" y="520" width="844" height="48" rx="24" fill="#0F172A"/>
  <text x="560" y="550" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="16">
    denied = you may retry. blocked = the OS prompt will not show; send the user to Settings.
  </text>
</svg>
