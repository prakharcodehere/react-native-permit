  <text x="632" y="313" text-anchor="middle" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="800">Retry + storage</text>
  <rect x="386" y="356" width="320" height="38" rx="19" fill="#334155"/>
  <text x="546" y="381" text-anchor="middle" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="700">Permit core + resolver + event bus</text>

