<svg width="1120" height="520" viewBox="0 0 1120 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">react-native-permit architecture</title>
  <desc id="desc">Architecture showing app UI using hooks, dialogs, sequence, Permit core, resolver, react-native-permissions, and native iOS Android permission APIs.</desc>
  <rect width="1120" height="520" rx="28" fill="#0F172A"/>
  <text x="56" y="68" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui" font-size="34" font-weight="800">Architecture</text>
  <text x="56" y="102" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="18">Small JS orchestration on top of native permission access.</text>

  <rect x="56" y="146" width="224" height="250" rx="18" fill="#1E293B" stroke="#334155"/>
  <text x="86" y="186" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="800">Your App</text>
  <text x="86" y="222" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="15">Screens</text>
  <text x="86" y="250" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="15">Design system</text>
  <text x="86" y="278" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="15">Feature gates</text>
  <text x="86" y="306" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="15">Analytics</text>
  <rect x="86" y="334" width="122" height="34" rx="17" fill="#DBEAFE"/>
  <text x="147" y="356" text-anchor="middle" fill="#1D4ED8" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="700">custom UI</text>

  <rect x="348" y="126" width="424" height="290" rx="22" fill="#111827" stroke="#475569"/>
  <text x="386" y="170" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="800">react-native-permit</text>
  <rect x="386" y="200" width="148" height="58" rx="14" fill="#1D4ED8"/>
  <text x="460" y="235" text-anchor="middle" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="800">Hooks</text>
  <rect x="558" y="200" width="148" height="58" rx="14" fill="#7C3AED"/>
  <text x="632" y="235" text-anchor="middle" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="800">Built-in UI</text>
  <rect x="386" y="278" width="148" height="58" rx="14" fill="#059669"/>
  <text x="460" y="313" text-anchor="middle" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="800">Sequence</text>
