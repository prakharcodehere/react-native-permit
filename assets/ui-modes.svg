<svg width="1120" height="500" viewBox="0 0 1120 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Built-in UI modes</title>
  <desc id="desc">Built-in UI modes showing modal, bottom sheet, screen, and inline permission presentation options.</desc>
  <rect width="1120" height="500" rx="28" fill="#F1F5F9"/>
  <text x="56" y="66" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="34" font-weight="800">Built-in UI modes</text>
  <text x="56" y="100" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="18">Use PermitDialog when you want light UI primitives without a full design system.</text>

  <g font-family="Inter, ui-sans-serif, system-ui">
    <rect x="64" y="150" width="220" height="250" rx="22" fill="#FFFFFF" stroke="#CBD5E1"/>
    <rect x="105" y="220" width="138" height="100" rx="16" fill="#DBEAFE" stroke="#2563EB"/>
    <text x="174" y="264" text-anchor="middle" fill="#1E40AF" font-size="18" font-weight="800">Modal</text>
    <text x="174" y="292" text-anchor="middle" fill="#1D4ED8" font-size="13">centered card</text>

    <rect x="324" y="150" width="220" height="250" rx="22" fill="#FFFFFF" stroke="#CBD5E1"/>
    <rect x="348" y="300" width="172" height="76" rx="18" fill="#DCFCE7" stroke="#22C55E"/>
    <text x="434" y="333" text-anchor="middle" fill="#15803D" font-size="18" font-weight="800">Bottom sheet</text>
    <text x="434" y="359" text-anchor="middle" fill="#166534" font-size="13">mobile-native feel</text>

    <rect x="584" y="150" width="220" height="250" rx="22" fill="#FFFFFF" stroke="#CBD5E1"/>
    <rect x="612" y="178" width="164" height="194" rx="16" fill="#F3E8FF" stroke="#A855F7"/>
    <text x="694" y="264" text-anchor="middle" fill="#7E22CE" font-size="18" font-weight="800">Screen</text>
    <text x="694" y="292" text-anchor="middle" fill="#6B21A8" font-size="13">onboarding page</text>

    <rect x="844" y="150" width="220" height="250" rx="22" fill="#FFFFFF" stroke="#CBD5E1"/>
    <rect x="874" y="214" width="160" height="92" rx="14" fill="#FEF3C7" stroke="#F59E0B"/>
    <text x="954" y="254" text-anchor="middle" fill="#B45309" font-size="18" font-weight="800">Inline</text>
    <text x="954" y="282" text-anchor="middle" fill="#92400E" font-size="13">inside content</text>
  </g>
</svg>
