<svg width="1120" height="560" viewBox="0 0 1120 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Retry and exhausted flow</title>
  <desc id="desc">Retry flow showing rationale, native prompt, denied attempts, retry, exhausted state, custom UI, and settings redirect.</desc>
  <rect width="1120" height="560" rx="28" fill="#111827"/>
  <text x="56" y="68" fill="#F9FAFB" font-family="Inter, ui-sans-serif, system-ui" font-size="34" font-weight="800">Retry + exhausted custom UI</text>
  <text x="56" y="102" fill="#D1D5DB" font-family="Inter, ui-sans-serif, system-ui" font-size="18">When retries run out, your custom exhausted UI or Settings fallback takes over.</text>

  <g font-family="Inter, ui-sans-serif, system-ui">
    <rect x="64" y="172" width="166" height="82" rx="18" fill="#1F2937" stroke="#4B5563"/>
    <text x="147" y="205" text-anchor="middle" fill="#F9FAFB" font-size="18" font-weight="800">Rationale UI</text>
    <text x="147" y="229" text-anchor="middle" fill="#D1D5DB" font-size="13">your copy first</text>

    <rect x="292" y="172" width="166" height="82" rx="18" fill="#1E3A8A" stroke="#3B82F6"/>
    <text x="375" y="205" text-anchor="middle" fill="#DBEAFE" font-size="18" font-weight="800">OS Prompt</text>
    <text x="375" y="229" text-anchor="middle" fill="#BFDBFE" font-size="13">native request</text>

    <rect x="520" y="172" width="166" height="82" rx="18" fill="#7F1D1D" stroke="#EF4444"/>
    <text x="603" y="205" text-anchor="middle" fill="#FEE2E2" font-size="18" font-weight="800">Denied</text>
    <text x="603" y="229" text-anchor="middle" fill="#FECACA" font-size="13">attempt 1</text>

    <rect x="748" y="172" width="166" height="82" rx="18" fill="#78350F" stroke="#F59E0B"/>
    <text x="831" y="205" text-anchor="middle" fill="#FEF3C7" font-size="18" font-weight="800">Retry UI</text>
    <text x="831" y="229" text-anchor="middle" fill="#FDE68A" font-size="13">try again</text>

    <rect x="292" y="356" width="166" height="82" rx="18" fill="#1E3A8A" stroke="#3B82F6"/>
    <text x="375" y="389" text-anchor="middle" fill="#DBEAFE" font-size="18" font-weight="800">OS Prompt</text>
    <text x="375" y="413" text-anchor="middle" fill="#BFDBFE" font-size="13">attempt 2</text>

    <rect x="520" y="356" width="166" height="82" rx="18" fill="#7F1D1D" stroke="#EF4444"/>
    <text x="603" y="389" text-anchor="middle" fill="#FEE2E2" font-size="18" font-weight="800">Denied</text>
    <text x="603" y="413" text-anchor="middle" fill="#FECACA" font-size="13">max reached</text>

    <rect x="748" y="338" width="270" height="118" rx="22" fill="#581C87" stroke="#C084FC"/>
    <text x="883" y="379" text-anchor="middle" fill="#F3E8FF" font-size="20" font-weight="800">Exhausted</text>
    <text x="883" y="407" text-anchor="middle" fill="#E9D5FF" font-size="14">custom UI, fallback screen,</text>
    <text x="883" y="429" text-anchor="middle" fill="#E9D5FF" font-size="14">or Open Settings action</text>
  </g>

  <path d="M230 213H286" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round"/>
  <path d="M276 203L288 213L276 223" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M458 213H514" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round"/>
  <path d="M504 203L516 213L504 223" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M686 213H742" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round"/>
  <path d="M732 203L744 213L732 223" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M831 254C831 300 782 397 692 397" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
  <path d="M702 387L690 397L702 407" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M520 397H464" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round"/>
  <path d="M474 387L462 397L474 407" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M686 397H742" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round"/>
  <path d="M732 387L744 397L732 407" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="64" y="472" width="994" height="42" rx="21" fill="#1F2937"/>
  <text x="561" y="499" text-anchor="middle" fill="#D1D5DB" font-family="Inter, ui-sans-serif, system-ui" font-size="15">Retry state is headless. You choose whether exhausted means custom UI, silent fallback, or Settings.</text>
</svg>
